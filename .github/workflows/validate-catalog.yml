name: Validate catalog

on:
  push:
  pull_request:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run validate
        env:
          CATALOG_VALIDATE_REMOTE: '1'
